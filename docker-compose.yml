services:
  db:
    image: postgres:16-alpine
    container_name: vmmsngr-postgres
    environment:
      POSTGRES_DB: vmmsngr
      POSTGRES_USER: vmmsngr
      POSTGRES_PASSWORD: vmmsngr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vmmsngr -d vmmsngr"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: vmmsngr-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - .:/app

volumes:
  postgres_data:

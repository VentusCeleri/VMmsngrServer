name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vmmsngr
          POSTGRES_USER: vmmsngr
          POSTGRES_PASSWORD: vmmsngr-ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vmmsngr -d vmmsngr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_NAME: VMmsngrServer
      ENVIRONMENT: test
      DEBUG: "false"
      DATABASE_URL: postgresql+psycopg2://vmmsngr:vmmsngr-ci-password@127.0.0.1:5432/vmmsngr
      POSTGRES_DB: vmmsngr
      POSTGRES_USER: vmmsngr
      POSTGRES_PASSWORD: vmmsngr-ci-password
      JWT_SECRET_KEY: ci-test-secret-that-is-long-enough-for-tests
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "30"
      CORS_ORIGINS: http://localhost:3000
      ALLOWED_HOSTS: "*"
      LOG_LEVEL: INFO
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_WINDOW_SECONDS: "60"
      RATE_LIMIT_AUTH_MAX_REQUESTS: "1000"
      RATE_LIMIT_PAIR_JOIN_MAX_REQUESTS: "1000"
      RATE_LIMIT_MESSAGES_MAX_REQUESTS: "1000"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Alembic heads
        run: |
          alembic upgrade head
          test "$(alembic heads --verbose | grep -c 'Rev:')" = "1"

      - name: Import app
        run: python -c "from app.main import app; print(app.title)"

      - name: Run tests
        run: pytest -q

      - name: Docker build
        run: docker build .
